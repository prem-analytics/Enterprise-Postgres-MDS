version: 2

models:
  - name: stg_posts
    description: "Cleaned staging view of raw platform posts"
    columns:
      - name: post_id
        description: "The primary key for this post record"
        tests:
          - unique
          - not_null
      - name: user_id
        description: "The originating user account identity"
        tests:
          - not_null

  - name: fct_user_post_metrics
    description: "Production summary mart calculating user creation metrics"
    columns:
      - name: user_id
        description: "The unique user identifier account key"
        tests:
          - unique
          - not_null